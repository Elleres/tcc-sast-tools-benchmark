services:
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    mem_limit: 2g
    ports:
      - "9000:9000"
    volumes:
      - data:/opt/sonarqube/data
      - logs:/opt/sonarqube/logs
      - extensions:/opt/sonarqube/extensions
    environment:
      - SONAR_WEB_JAVA_OPTS=-Xmx512m -Xms512m

    restart: unless-stopped

volumes:
  data:
  logs:
  extensions:
